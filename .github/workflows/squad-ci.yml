name: Squad CI
# dotnet project — configure build/test commands below

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PptxTools.slnx

      - name: Build
        run: dotnet build PptxTools.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test --solution PptxTools.slnx --no-build --configuration Release
