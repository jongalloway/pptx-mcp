name: Squad Insider Release

on:
  push:
    branches: [insider]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PptxTools.slnx

      - name: Build
        run: dotnet build PptxTools.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test PptxTools.slnx --no-build --configuration Release --verbosity normal

      - name: Pack (prerelease)
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          dotnet pack src/PptxTools/PptxTools.csproj --no-build --configuration Release \
            --output ./nupkg \
            -p:VersionSuffix="insider.${SHORT_SHA}"

      - name: Get version
        id: version
        run: |
          VERSION=$(dotnet msbuild src/PptxTools/PptxTools.csproj -getProperty:Version 2>/dev/null || \
                    grep -oP '(?<=<Version>)[^<]+' src/PptxTools/PptxTools.csproj | head -1)
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-insider.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create insider GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" ./nupkg/*.nupkg \
            --title "pptx-tools $TAG" \
            --generate-notes \
            --prerelease
