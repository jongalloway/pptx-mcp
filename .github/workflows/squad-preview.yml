name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PptxTools.slnx

      - name: Build
        run: dotnet build PptxTools.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test --solution PptxTools.slnx --no-build --configuration Release --verbosity normal

      - name: Validate pack
        run: dotnet pack src/PptxTools/PptxTools.csproj --no-build --configuration Release --output /tmp/nupkg
